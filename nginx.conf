server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Fingerprinted build assets are safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every unmatched path serves index.html so client-side
    # routing (React Router) works on deep links and refreshes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
